<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>stillful</title>
  <meta name="description" content="stillful - A meditation app for finding peace in the present moment.">
  <meta name="robots" content="noindex">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3ZY53PF6NJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3ZY53PF6NJ');
  </script>

  <script>
    (function () {
      var APPLE_URL = 'https://apps.apple.com/us/app/stillful/id6743396382';
      var GOOGLE_URL = 'https://play.google.com/store/apps/details?id=com.mindfulnessresearch.stillful';
      var HOME_URL = 'index.html';

      var ua = (navigator.userAgent || navigator.vendor || window.opera || '').toLowerCase();
      var platform = (navigator.platform || '').toLowerCase();
      var maxTouch = navigator.maxTouchPoints || 0;

      var isAndroid = /android/.test(ua);
      // iPadOS reports as MacIntel with touch points > 1
      var isIOS = /iphone|ipad|ipod/.test(ua) ||
                  (platform === 'macintel' && maxTouch > 1);

      var target = HOME_URL;
      var store = 'home';
      if (isAndroid) { target = GOOGLE_URL; store = 'google'; }
      else if (isIOS) { target = APPLE_URL; store = 'apple'; }

      var params = new URLSearchParams(window.location.search);
      var source = params.get('utm_source') || 'direct';
      gtag('event', 'store_redirect', {
        'store_type': store,
        'traffic_source': source
      });

      window.location.replace(target);
    })();
  </script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    a { color: #f5f5f0; }
  </style>
</head>
