<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>stillful</title>
  <meta name="description" content="stillful - A meditation app for finding peace in the present moment. Download on iOS and Android.">

  <!-- Open Graph / Social sharing -->
  <meta property="og:title" content="stillful - Meditation Made Simple">
  <meta property="og:description" content="A meditation app for finding peace in the present moment.">
  <meta property="og:type" content="website">

  <!-- Favicon (optional - add your icon) -->
  <!-- <link rel="icon" type="image/png" href="favicon.png"> -->

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3ZY53PF6NJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3ZY53PF6NJ');

    function trackStoreClick(store) {
      var params = new URLSearchParams(window.location.search);
      var source = params.get('utm_source') || 'direct';
      gtag('event', 'store_click', {
        'store_type': store,
        'traffic_source': source
      });
    }
  </script>

  <!-- Google Fonts - Crimson Pro -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: url('mobile.png') center bottom/cover no-repeat fixed;
      color: #2D2D5F;
    }

    @media (min-width: 768px) {
      body {
        background-image: url('desktop.png');
      }
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      letter-spacing: 0.08em;
    }

    .tagline {
      font-size: 1.25rem;
      font-style: italic;
      opacity: 0.9;
      margin-bottom: 0.5rem;
    }

    .tagline-group {
      display: inline-block;
      text-align: left;
    }

    .features {
      margin-top: 1rem;
    }

    .feature-line {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 0.25rem;
    }

    .feature-line::before {
      content: "• ";
    }

    .cta {
      font-size: 1.15rem;
      font-weight: 500;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 280px;
      margin: 0 auto;
    }

    .buttons a {
      display: block;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .buttons a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .buttons a:active {
      transform: translateY(0);
    }

    .buttons img {
      width: 180px;
      height: auto;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>stillful</h1>
    <div class="tagline-group">
      <p class="tagline">free guided meditations</p>
      <div class="features">
        <p class="feature-line">choose how long</p>
        <p class="feature-line">choose how intense</p>
        <p class="feature-line">breathwork included</p>
      </div>
    </div>

    <p class="cta">want to try?</p>

    <div class="buttons">
      <a href="https://apps.apple.com/us/app/stillful/id6743396382" onclick="trackStoreClick('apple')">
        <img src="Download_on_the_App_Store_Badge_US-UK_RGB_blk_092917.svg" alt="Download on the App Store">
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.mindfulnessresearch.stillful" onclick="trackStoreClick('google')">
        <img src="GetItOnGooglePlay_Badge_Web_color_English.svg" alt="Get it on Google Play">
      </a>
    </div>
  </div>
</body>
</html>
